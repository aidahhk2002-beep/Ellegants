<!DOCTYPE html>
<html>

<head>

<title>Cart | ELEGANT</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="script.js"></script>

<style>

body{
font-family:Arial;
font-weight:600;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("Background.png") no-repeat center;
background-size:650px;
opacity:0.05;
z-index:-1;
}

/* Navbar */

.navbar{
background:white;
border-bottom:1px solid #eee;
}

.navbar-brand{
font-weight:bold;
letter-spacing:3px;
}

.nav-link{
color:black !important;
}

.nav-link:hover{
color:#ff4fa3 !important;
}

/* Cart box */

.cart-box{
background:white;
padding:40px;
margin-top:80px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
border-radius:10px;
}

.price{
color:#ff4fa3;
font-weight:bold;
}

/* Buttons */

.btn-main{
background:#ff4fa3;
color:white;
border:none;
}

.btn-main:hover{
background:#e63c8f;
}

/* Footer */

.footer{
background:black;
color:white;
text-align:center;
padding:20px;
margin-top:50px;
}

</style>

</head>

<body onload="loadCart()">

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="index.html">ELEGANT</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="products.html">Shop</a>
</li>

<li class="nav-item">
<a class="nav-link" href="login.html">Login</a>
</li>

<li class="nav-item">
<a class="nav-link" href="contact.html">Contact</a>
</li>

<li class="nav-item">
<a class="nav-link" href="cart.html">🛒 Cart</a>
</li>

</ul>

</div>

</nav>

<div class="container">

<div class="cart-box">

<h3 class="text-center mb-4">Your Shopping Cart</h3>

<table class="table">

<thead>

<tr>
<th>Product</th>
<th>Price</th>
</tr>

</thead>

<tbody id="cartItems">

</tbody>

</table>

<h4 class="text-end">Total: BD <span id="total"></span></h4>

<div class="text-end mt-3">

<button onclick="clearCart()" class="btn btn-main">
Clear Cart
</button>

</div>

</div>

</div>

<div class="footer">

<p>© 2026 Elegant Dresses</p>

</div>

</body>
</html>
